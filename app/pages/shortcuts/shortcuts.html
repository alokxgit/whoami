<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alok | Shortcuts Configuration</title>
    <meta name="description" content="Configure custom keybindings for Vim mode and global page navigation.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400..700;1,400..700&family=IM+Fell+English:ital@0;1&family=Marcellus&family=Caveat:wght@400;600&family=Sacramento&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../shared/css/variables.css">
    <link rel="stylesheet" href="../../shared/css/base.css">
    <link rel="stylesheet" href="../../shared/css/book.css">
    <link rel="stylesheet" href="shortcuts.css">
    <link rel="stylesheet" href="../../shared/css/responsive.css">
</head>

<body class="layout-codex book-state-open">
    <script>
        (function () {
            const layout = localStorage.getItem('scriptorium_layout') || 'folio';
            document.body.className = document.body.className.replace(/layout-\w+/, 'layout-' + layout);
            if (!document.body.classList.contains('layout-' + layout)) {
                document.body.classList.add('layout-' + layout);
            }
            const hideLines = localStorage.getItem('scriptorium_hide_lines') === 'true';
            if (hideLines) {
                document.body.classList.add('hide-page-lines');
            }
        })();
    </script>

    <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
        <defs>
            <filter id="paper-texture" x="0%" y="0%" width="100%" height="100%">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise" />
                <feDiffuseLighting in="noise" lighting-color="#fdfaf2" surfaceScale="1.5" result="light">
                    <feDistantLight azimuth="60" elevation="55" />
                </feDiffuseLighting>
                <feBlend mode="multiply" in="SourceGraphic" in2="light" />
            </filter>
        </defs>
    </svg>

    <div class="desk-bg">
        <div class="desk-glow"></div>
        <div class="book-wrapper">
            <div class="open-book-view">

                <!-- Bookmarks rail -->
                <nav class="bookmarks-rail" aria-label="Journal sections">
                    <a class="bookmark-tab" data-spread="reflection-study" href="../reflection/reflection.html">
                        <span class="bm-num">I</span><span class="bm-label">Reflection</span>
                    </a>
                    <a class="bookmark-tab" data-spread="deeds-goals" href="../goals/goals.html">
                        <span class="bm-num">II</span><span class="bm-label">Goals &amp; Tasks</span>
                    </a>
                    <a class="bookmark-tab" data-spread="chronicles" href="../journal/journal.html">
                        <span class="bm-num">III</span><span class="bm-label">Journal</span>
                    </a>
                    <a class="bookmark-tab" data-spread="kb" href="../knowledge_base/kb.html">
                        <span class="bm-num">IV</span><span class="bm-label">Almanac</span>
                    </a>
                    <a class="bookmark-tab" data-spread="settings" href="../settings/settings.html">
                        <span class="bm-num">V</span><span class="bm-label">Settings</span>
                    </a>
                    <a class="bookmark-tab active" data-spread="shortcuts" href="shortcuts.html">
                        <span class="bm-num">VI</span><span class="bm-label">Shortcuts</span>
                    </a>
                    <a class="bookmark-tab close-book-banner" href="../../index.html" title="Close Journal">
                        <span class="bm-num">✕</span><span class="bm-label">Close</span>
                    </a>
                </nav>

                <!-- Book casing -->
                <div class="book-casing">

                    <!-- SPREAD VI: Shortcuts -->
                    <div class="book-spread active-spread" id="spread-shortcuts">

                        <!-- LEFT PAGE: Vim Keybindings -->
                        <div class="book-page page-left">
                            <div class="page-texture"></div>

                            <div class="page-running-header">
                                <span class="running-brand">Alok</span>
                                <div class="running-switcher">
                                    <div class="page-date-badge">
                                        <span class="day-number">30</span>
                                        <span class="month">May</span>
                                        <span class="year">2026</span>
                                    </div>
                                </div>
                            </div>

                            <div class="page-header">
                                <h1>Vim Keybindings</h1>
                                <p class="page-header-sub">Custom keyboard bindings for editors</p>
                            </div>

                            <div class="section-divider">
                                <div class="divider-rule"></div>

                                <div class="divider-rule"></div>
                            </div>

                            <div class="shortcuts-container scrollable-area">
                                <!-- Vim motions form controls -->
                                <div class="control-grid" id="vim-shortcuts-grid">
                                    <!-- Populated dynamically via JS -->
                                </div>
                            </div>

                        </div>

                        <!-- RIGHT PAGE: Website Navigation Keybindings -->
                        <div class="book-page page-right">
                            <div class="page-texture"></div>

                            <div class="page-running-header">
                                <span class="running-section">Global Shortcuts</span>
                                <div class="page-date-badge">
                                    <span class="day-number">30</span>
                                    <span class="month">May</span>
                                    <span class="year">2026</span>
                                </div>
                            </div>

                            <div class="page-header">
                                <h1>Navigation</h1>
                                <p class="page-header-sub">Move swiftly across the journal spreads</p>
                            </div>

                            <div class="section-divider">
                                <div class="divider-rule"></div>

                                <div class="divider-rule"></div>
                            </div>

                            <div class="shortcuts-container scrollable-area">
                                <!-- Navigation keybinds form controls -->
                                <div class="control-grid" id="nav-shortcuts-grid">
                                    <!-- Populated dynamically via JS -->
                                </div>

                                <div class="actions-row"
                                    style="margin-top: 1.5rem; display: flex; gap: 0.8rem; justify-content: center; padding: 0 0.8rem 1rem 0.8rem;">
                                    <button class="action-btn secondary-btn" id="reset-defaults-btn">Reset
                                        Defaults</button>
                                    <button class="action-btn primary-btn" id="save-shortcuts-btn">Save
                                        Keybindings</button>
                                </div>
                            </div>

                        </div>

                    </div><!-- /spread -->
                </div><!-- /book-casing -->
            </div><!-- /open-book-view -->
        </div><!-- /book-wrapper -->
    </div><!-- /desk-bg -->

    <!-- Premium custom Toast notification container -->
    <div id="shortcuts-toast" class="custom-toast-container" aria-live="polite">
        <div class="toast-content">
            <span class="toast-icon">✨</span>
            <span class="toast-message">Keybindings saved to your ledger.</span>
        </div>
    </div>

    <script src="../../shared/js/core.js"></script>
    <script src="shortcuts.js"></script>
</body>

</html>
