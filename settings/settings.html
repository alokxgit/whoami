<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alok | Journal Settings</title>
    <meta name="description" content="Configure your journal theme, audio, and data settings.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400..700;1,400..700&family=IM+Fell+English:ital@0;1&family=Marcellus&family=Patrick+Hand&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../shared/css/variables.css">
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/book.css">
    <link rel="stylesheet" href="settings.css">
    <link rel="stylesheet" href="../shared/css/responsive.css">
</head>

<body class="layout-codex book-state-open">

    <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
        <defs>
            <filter id="paper-texture" x="0%" y="0%" width="100%" height="100%">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise" />
                <feDiffuseLighting in="noise" lighting-color="#fdfaf2" surfaceScale="1.5" result="light">
                    <feDistantLight azimuth="60" elevation="55" />
                </feDiffuseLighting>
                <feBlend mode="multiply" in="SourceGraphic" in2="light" />
            </filter>
        </defs>
    </svg>

    <div class="desk-bg">
        <div class="desk-glow"></div>
        <div class="book-wrapper">
            <div class="open-book-view">

                <!-- Bookmarks rail -->
                <nav class="bookmarks-rail" aria-label="Journal sections">
                    <a class="bookmark-tab" data-spread="reflection-study" href="../reflection/reflection.html">
                        <span class="bm-num">I</span><span class="bm-label">Reflection</span>
                    </a>
                    <a class="bookmark-tab" data-spread="deeds-goals" href="../goals/goals.html">
                        <span class="bm-num">II</span><span class="bm-label">Goals &amp; Tasks</span>
                    </a>
                    <a class="bookmark-tab" data-spread="chronicles" href="../journal/journal.html">
                        <span class="bm-num">III</span><span class="bm-label">Journal</span>
                    </a>
                    <a class="bookmark-tab active" data-spread="settings" href="settings.html">
                        <span class="bm-num">IV</span><span class="bm-label">Settings</span>
                    </a>
                </nav>

                <!-- Book casing -->
                <div class="book-casing">
                    <a href="../index.html" class="close-book-banner">← Close Journal</a>

                    <!-- SPREAD IV: Settings -->
                    <div class="book-spread active-spread" id="spread-settings">

                        <!-- LEFT PAGE: Theme Selection -->
                        <div class="book-page page-left">
                            <div class="page-texture"></div>
                            <div class="flourish top">❧</div>

                            <div class="page-running-header">
                                <span class="running-brand">Alok</span>
                                <div class="running-switcher">
                                    <div class="layout-switcher-mini">
                                        <button class="switcher-btn" data-layout="codex" title="Monk's Codex">📖</button>
                                        <button class="switcher-btn" data-layout="folio" title="Traveler's Folio">💼</button>
                                        <button class="switcher-btn" data-layout="ledger" title="Scribe's Ledger">📜</button>
                                    </div>
                                </div>
                            </div>

                            <div class="page-header">
                                <h1>Journal Theme</h1>
                                <p class="page-header-sub">Choose your casing style</p>
                            </div>

                            <div class="section-divider">
                                <div class="divider-rule"></div>
                                <span class="divider-icon">🎨</span>
                                <span class="section-sub">Visual Style</span>
                                <div class="divider-rule"></div>
                            </div>

                            <div class="theme-selector-panel">
                                <button class="theme-card-option active" data-layout="codex" id="theme-codex">
                                    <div class="theme-swatch theme-codex-swatch"></div>
                                    <div class="theme-card-info">
                                        <div class="theme-card-name">📖 Monk's Codex</div>
                                        <div class="theme-card-desc">Classic warm parchment with sepia ink</div>
                                    </div>
                                    <span class="theme-active-badge">Active</span>
                                </button>
                                <button class="theme-card-option" data-layout="folio" id="theme-folio">
                                    <div class="theme-swatch theme-folio-swatch"></div>
                                    <div class="theme-card-info">
                                        <div class="theme-card-name">💼 Traveler's Folio</div>
                                        <div class="theme-card-desc">Aged kraft paper with earthy tones</div>
                                    </div>
                                    <span class="theme-active-badge">Active</span>
                                </button>
                                <button class="theme-card-option" data-layout="ledger" id="theme-ledger">
                                    <div class="theme-swatch theme-ledger-swatch"></div>
                                    <div class="theme-card-info">
                                        <div class="theme-card-name">📜 Scribe's Ledger</div>
                                        <div class="theme-card-desc">Dark midnight slate with gold accents</div>
                                    </div>
                                    <span class="theme-active-badge">Active</span>
                                </button>
                            </div>

                            <div class="flourish bottom">❦</div>
                        </div>

                        <!-- SPINE -->
                        <div class="page-spine"></div>

                        <!-- RIGHT PAGE: Controls & Data -->
                        <div class="book-page page-right">
                            <div class="page-texture"></div>
                            <div class="flourish top">❧</div>

                            <div class="page-running-header">
                                <span class="running-section">Settings</span>
                                <div class="page-date-badge">
                                    <span class="day-number">30</span>
                                    <span class="month">May</span>
                                    <span class="year">2026</span>
                                </div>
                            </div>

                            <div class="page-header">
                                <h1>Preferences</h1>
                                <p class="page-header-sub">Audio and data controls</p>
                            </div>

                            <div class="section-divider">
                                <div class="divider-rule"></div>
                                <span class="divider-icon">⚙️</span>
                                <span class="section-sub">Audio</span>
                                <div class="divider-rule"></div>
                            </div>

                            <div class="settings-control-row">
                                <div>
                                    <div class="settings-control-label">Mute Ambient Sounds</div>
                                    <div class="settings-control-desc">Silence all background audio</div>
                                </div>
                                <label class="toggle-switch">
                                    <input type="checkbox" id="mute-ambient-audio-toggle">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>

                            <div class="section-divider" style="margin-top:1rem;">
                                <div class="divider-rule"></div>
                                <span class="divider-icon">💾</span>
                                <span class="section-sub">Data</span>
                                <div class="divider-rule"></div>
                            </div>

                            <div style="display:flex;flex-direction:column;gap:0.6rem;margin-top:0.5rem;">
                                <button class="settings-action-btn" id="export-journal-btn">
                                    📤 Export Backup
                                </button>
                                <button class="settings-action-btn danger-btn" id="reset-journal-btn">
                                    🗑️ Reset All Data
                                </button>
                            </div>

                            <div class="flourish bottom">❦</div>
                        </div>

                    </div><!-- /spread -->
                </div><!-- /book-casing -->
            </div><!-- /open-book-view -->
        </div><!-- /book-wrapper -->
    </div><!-- /desk-bg -->

    <script src="../shared/js/core.js"></script>
    <script src="settings.js"></script>
</body>

</html>
