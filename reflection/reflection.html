<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alok | Reflection &amp; Study</title>
    <meta name="description" content="A personal space for daily reflection, wisdom, and focus.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400..700;1,400..700&family=IM+Fell+English:ital@0;1&family=Marcellus&family=Caveat:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../shared/css/variables.css">
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/book.css">
    <link rel="stylesheet" href="reflection.css">
    <link rel="stylesheet" href="../shared/css/responsive.css">
</head>

<body class="layout-codex book-state-open">

    <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
        <defs>
            <filter id="paper-texture" x="0%" y="0%" width="100%" height="100%">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise" />
                <feDiffuseLighting in="noise" lighting-color="#fdfaf2" surfaceScale="1.5" result="light">
                    <feDistantLight azimuth="60" elevation="55" />
                </feDiffuseLighting>
                <feBlend mode="multiply" in="SourceGraphic" in2="light" />
            </filter>
        </defs>
    </svg>

    <div class="desk-bg">
        <div class="desk-glow"></div>
        <div class="book-wrapper">
            <div class="open-book-view">

                <!-- Bookmarks rail -->
                <nav class="bookmarks-rail" aria-label="Journal sections">
                    <a class="bookmark-tab active" data-spread="reflection-study" href="reflection.html">
                        <span class="bm-num">I</span><span class="bm-label">Reflection</span>
                    </a>
                    <a class="bookmark-tab" data-spread="deeds-goals" href="../goals/goals.html">
                        <span class="bm-num">II</span><span class="bm-label">Goals &amp; Tasks</span>
                    </a>
                    <a class="bookmark-tab" data-spread="chronicles" href="../journal/journal.html">
                        <span class="bm-num">III</span><span class="bm-label">Journal</span>
                    </a>
                    <a class="bookmark-tab" data-spread="kb" href="../knowledge_base/kb.html">
                        <span class="bm-num">IV</span><span class="bm-label">Almanac</span>
                    </a>
                    <a class="bookmark-tab" data-spread="settings" href="../settings/settings.html">
                        <span class="bm-num">V</span><span class="bm-label">Settings</span>
                    </a>
                    <a class="bookmark-tab close-book-banner" href="../index.html" id="close-book-banner" title="Close Journal">
                        <span class="bm-num">✕</span><span class="bm-label">Close</span>
                    </a>
                </nav>

                <!-- Book casing -->
                <div class="book-casing">


                    <!-- SPREAD I: Reflection & Study -->
                    <div class="book-spread active-spread" id="spread-reflection-study">

                        <!-- LEFT PAGE: Active Commitments -->
                        <div class="book-page page-left">
                            <div class="page-texture"></div>
                            <div class="flourish top">❧</div>

                            <div class="page-running-header">
                                <span class="running-brand">Alok</span>
                                <div class="running-switcher">
                                    <div class="layout-switcher-mini">
                                        <button class="switcher-btn" data-layout="codex" title="Monk's Codex">📖</button>
                                        <button class="switcher-btn" data-layout="folio" title="Traveler's Folio">💼</button>
                                        <button class="switcher-btn" data-layout="ledger" title="Scribe's Ledger">📜</button>
                                    </div>
                                </div>
                            </div>

                            <div class="page-header">
                                <h1>Active Commitments</h1>
                                <p class="page-header-sub">Your sacred bindings and intentions</p>
                            </div>


                            <div class="section-divider" style="margin-top: 1rem;">
                                <div class="divider-rule"></div>
                                <span class="divider-icon">📜</span>
                                <span class="section-sub">Your Commitments Registry</span>
                                <div class="divider-rule"></div>
                            </div>

                            <div class="commitments-container-scrollable">
                                <ul id="commitments-list" class="commitments-list">
                                    <!-- Dynamic content -->
                                </ul>
                            </div>

                            <div class="flourish bottom">❦</div>
                        </div>


                        <!-- RIGHT PAGE: Daily Check-in -->
                        <div class="book-page page-right">
                            <div class="page-texture"></div>
                            <div class="flourish top">❧</div>

                            <div class="page-running-header">
                                <span class="running-section">Daily Check-in</span>
                                <div class="page-date-badge">
                                    <span class="day-number">30</span>
                                    <span class="month">May</span>
                                    <span class="year">2026</span>
                                </div>
                            </div>

                            <div class="page-header">
                                <h1>Daily Check-in</h1>
                                <p class="page-header-sub">Record today's work honestly</p>
                            </div>

                            <form id="checkin-form" class="reflection-form">
                                <div class="form-group">
                                    <label class="form-label" for="checkin-commitment-select">Which commitment did you work on today?</label>
                                    <select id="checkin-commitment-select" required>
                                        <option value="" disabled selected>Select a commitment...</option>
                                        <!-- Dynamically populated from commitments -->
                                    </select>
                                </div>
                                
                                <div class="form-group">
                                    <label class="form-label">Did you move forward?</label>
                                    <div class="yes-no-buttons">
                                        <button type="button" class="yn-btn active" data-val="Yes">✨ Yes</button>
                                        <button type="button" class="yn-btn" data-val="No">⏳ No</button>
                                    </div>
                                    <input type="hidden" id="checkin-forward" value="Yes" required>
                                </div>

                                <div class="form-group">
                                    <label class="form-label" for="checkin-notes">One honest line</label>
                                    <input type="text" id="checkin-notes" placeholder="What happened today..." required>
                                </div>

                                <button type="submit" class="submit-btn" style="width: 100%; margin-top: 0.5rem;">💾 Record Check-in</button>
                            </form>

                            <div class="section-divider" style="margin-top: 1rem;">
                                <div class="divider-rule"></div>
                                <span class="divider-icon">📖</span>
                                <span class="section-sub">Recent Progress Ledger</span>
                                <div class="divider-rule"></div>
                            </div>

                            <div class="checkins-container-scrollable">
                                <div id="checkins-list" class="checkins-list">
                                    <!-- Dynamic list of recent check-ins -->
                                </div>
                            </div>

                            <div class="flourish bottom">❦</div>
                        </div>

                    </div><!-- /spread -->
                </div><!-- /book-casing -->
            </div><!-- /open-book-view -->
        </div><!-- /book-wrapper -->
    </div><!-- /desk-bg -->

    <script src="../shared/js/core.js"></script>
    <script src="reflection.js"></script>
</body>

</html>
